name: Mobile Build (Expo)

on:
  push:
    branches: [main]
    paths: ["apps/mobile/**", "packages/**"]
  pull_request:
    branches: [main]
    paths: ["apps/mobile/**", "packages/**"]
  workflow_dispatch:

concurrency:
  group: mobile-${{ github.ref }}
  cancel-in-progress: true

jobs:
  typecheck-lint:
    name: Typecheck & Lint Mobile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Typecheck
        run: pnpm --filter @tulmek/mobile exec tsc --noEmit

  expo-doctor:
    name: Expo Doctor
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Setup Expo
        uses: expo/expo-github-action@v8
        with:
          expo-version: latest
          eas-version: latest
          token: ${{ secrets.EXPO_TOKEN }}

      # expo-doctor must not be allowed to silently fail.
      # If it reports issues, the build should fail.
      - name: Expo Doctor
        run: cd apps/mobile && npx expo-doctor

  metro-bundle:
    name: Metro Bundle (Android)
    runs-on: ubuntu-latest
    needs: [typecheck-lint]
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Export Metro bundle (verifies bundling works)
        run: cd apps/mobile && npx expo export --platform android
        env:
          CI: true

      - name: Verify bundle output
        run: |
          if [ ! -d "apps/mobile/dist" ]; then
            echo "::error::Metro bundle export produced no output"
            exit 1
          fi
          echo "Bundle size:"
          du -sh apps/mobile/dist/
