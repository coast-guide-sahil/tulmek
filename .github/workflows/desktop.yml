name: Desktop Build (Tauri)

on:
  push:
    branches: [main]
    paths: ["apps/desktop/**", "packages/**"]
  pull_request:
    branches: [main]
    paths: ["apps/desktop/**", "packages/**"]
  workflow_dispatch:

concurrency:
  group: desktop-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    name: Build Desktop (${{ matrix.label }})
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            label: Linux-x64
          - platform: macos-latest
            target: aarch64-apple-darwin
            label: macOS-arm64
          - platform: windows-latest
            target: x86_64-pc-windows-msvc
            label: Windows-x64
    runs-on: ${{ matrix.platform }}

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "apps/desktop/src-tauri -> target"
          cache-on-failure: true

      - name: Install Linux deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build web frontend (static export for Tauri frontendDist)
        run: pnpm --filter @tulmek/web build
        env:
          NEXT_OUTPUT: export
          NEXT_PUBLIC_APP_URL: http://localhost:3000

      # CI builds verify compilation succeeds without signing.
      # Signing keys are only required for the release workflow.
      - name: Build desktop app (unsigned CI check)
        run: pnpm --filter @tulmek/desktop tauri:build
        env:
          # Explicitly no signing key — CI validates the build compiles.
          # The release workflow (desktop-release.yml) handles signed builds.
          CI: true

      - name: Verify binary was produced
        shell: bash
        run: |
          if [ "$RUNNER_OS" == "Linux" ]; then
            ls -la apps/desktop/src-tauri/target/release/bundle/deb/ || ls -la apps/desktop/src-tauri/target/release/bundle/appimage/
          elif [ "$RUNNER_OS" == "macOS" ]; then
            ls -la apps/desktop/src-tauri/target/release/bundle/macos/
          elif [ "$RUNNER_OS" == "Windows" ]; then
            ls -la apps/desktop/src-tauri/target/release/bundle/msi/ || ls -la apps/desktop/src-tauri/target/release/bundle/nsis/
          fi

      - name: Upload artifacts
        uses: actions/upload-artifact@v7
        with:
          name: desktop-${{ matrix.label }}
          path: apps/desktop/src-tauri/target/release/bundle/
          retention-days: 7
