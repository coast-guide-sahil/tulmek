name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

env:
  NEXT_PUBLIC_APP_URL: http://localhost:3000

jobs:
  # ─── FAST CHECKS (every PR) ──────────────────────
  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - uses: rharkor/caching-for-turbo@v2.3.11
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint typecheck

  unit-tests:
    name: Unit Tests
    runs-on: ubuntu-latest
    permissions:
      pull-requests: write
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - uses: rharkor/caching-for-turbo@v2.3.11
      - run: pnpm install --frozen-lockfile
      - name: Run tests with coverage
        run: pnpm turbo test -- --coverage
      - name: Upload coverage artifacts
        uses: actions/upload-artifact@v6
        if: always()
        with:
          name: coverage-reports
          path: |
            packages/core/coverage/
            apps/web/coverage/
          retention-days: 7
      - name: Coverage report (PR comment)
        if: github.event_name == 'pull_request'
        uses: davelosert/vitest-coverage-report-action@v2
        with:
          working-directory: packages/core
          name: "Core Package Coverage"

  content-validation:
    name: Validate Content
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @tulmek/web validate-content

  build:
    name: Build
    runs-on: ubuntu-latest
    needs: [lint-typecheck]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - uses: rharkor/caching-for-turbo@v2.3.11
      - run: pnpm install --frozen-lockfile
      - uses: actions/cache@v5
        with:
          path: apps/web/.next/cache
          key: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-${{ hashFiles('apps/web/src/**') }}
          restore-keys: nextjs-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}-
      - run: pnpm turbo build --force
      - name: Verify build output exists
        run: |
          if [ ! -d "apps/web/.next" ]; then
            echo "::error::apps/web/.next not found after build"
            exit 1
          fi
          echo "Build output verified: $(find apps/web/.next -name '*.js' | head -5 | wc -l) JS files found"
      - name: Upload build output for downstream jobs
        uses: actions/upload-artifact@v6
        with:
          name: web-build
          path: |
            apps/web/.next/
          retention-days: 1

  # ─── E2E TESTS (every PR) ───────────────────────
  e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - uses: rharkor/caching-for-turbo@v2.3.11
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @tulmek/web exec playwright install --with-deps chromium
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @tulmek/web exec playwright install-deps chromium
      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: web-build
          path: apps/web/
      - name: Wait for server to be ready
        run: |
          pnpm --filter @tulmek/web start &
          npx wait-on http://localhost:3000 --timeout 30000
      - name: Run E2E tests (excluding a11y — runs in separate job)
        run: |
          pnpm --filter @tulmek/web exec playwright test \
            health.spec.ts \
            navigation.spec.ts \
            progress.spec.ts \
            hub.spec.ts \
            visual.spec.ts
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - name: Upload Playwright report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 14

  # ─── ACCESSIBILITY (every PR, separate job for visibility) ──
  accessibility:
    name: Accessibility Tests
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - uses: rharkor/caching-for-turbo@v2.3.11
      - run: pnpm install --frozen-lockfile
      - name: Cache Playwright browsers
        id: playwright-cache
        uses: actions/cache@v5
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - name: Install Playwright browsers
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        run: pnpm --filter @tulmek/web exec playwright install --with-deps chromium
      - name: Install Playwright system deps
        if: steps.playwright-cache.outputs.cache-hit == 'true'
        run: pnpm --filter @tulmek/web exec playwright install-deps chromium
      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: web-build
          path: apps/web/
      - name: Wait for server to be ready
        run: |
          pnpm --filter @tulmek/web start &
          npx wait-on http://localhost:3000 --timeout 30000
      - name: Run accessibility tests
        run: pnpm --filter @tulmek/web exec playwright test accessibility.spec.ts
        env:
          PLAYWRIGHT_BASE_URL: http://localhost:3000
      - name: Upload a11y report
        uses: actions/upload-artifact@v6
        if: ${{ !cancelled() }}
        with:
          name: a11y-report
          path: apps/web/playwright-report/
          retention-days: 14

  # ─── LIGHTHOUSE (every PR + main) ───────────────
  lighthouse:
    name: Lighthouse CI
    runs-on: ubuntu-latest
    needs: [build]
    steps:
      - uses: actions/checkout@v6
      - uses: pnpm/action-setup@v5
      - uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"
      - uses: rharkor/caching-for-turbo@v2.3.11
      - run: pnpm install --frozen-lockfile
      - name: Download build artifact
        uses: actions/download-artifact@v7
        with:
          name: web-build
          path: apps/web/
      - uses: treosh/lighthouse-ci-action@v12
        with:
          configPath: ./lighthouserc.json
          uploadArtifacts: true
          temporaryPublicStorage: true
