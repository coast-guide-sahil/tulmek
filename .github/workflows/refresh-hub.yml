name: Refresh Hub Content

on:
  schedule:
    # Run every 3 hours for maximum freshness
    - cron: "0 */3 * * *"
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: refresh-hub
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh:
    name: Fetch & Commit Fresh Content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch hub content
        run: pnpm --filter @tulmek/web fetch-hub-content
        env:
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
          RAPIDAPI_KEY: ${{ secrets.RAPIDAPI_KEY }}

      - name: Validate fetched content
        run: pnpm --filter @tulmek/web validate-content

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet packages/content/src/hub/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
            echo "No content changes detected."
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
            echo "Content changes detected:"
            git diff --stat packages/content/src/hub/
          fi

      - name: Commit & push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add packages/content/src/hub/
          git commit -m "chore: refresh hub content $(date -u +%Y-%m-%d)"
          git push
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        continue-on-error: true

      - name: Push via PR if direct push fails
        if: steps.changes.outputs.changed == 'true'
        run: |
          # If direct push succeeded, skip PR creation
          if git diff --quiet HEAD origin/main 2>/dev/null; then
            echo "Direct push succeeded, skipping PR."
            exit 0
          fi
          # Create a branch and PR for content refresh
          BRANCH="chore/content-refresh-$(date -u +%Y%m%d-%H%M)"
          git checkout -b "$BRANCH"
          git push origin "$BRANCH"
          gh pr create --title "chore: refresh hub content $(date -u +%Y-%m-%d)" \
            --body "Automated content refresh from GitHub Actions cron." \
            --base main --head "$BRANCH"
          # Auto-merge if possible
          gh pr merge "$BRANCH" --squash --auto 2>/dev/null || true
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
