name: Refresh Hub Content

on:
  schedule:
    # Run daily at 6:00 UTC
    - cron: "0 6 * * *"
  workflow_dispatch: # Allow manual trigger

concurrency:
  group: refresh-hub
  cancel-in-progress: true

permissions:
  contents: write

jobs:
  refresh:
    name: Fetch & Commit Fresh Content
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup pnpm
        uses: pnpm/action-setup@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: "24"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Fetch hub content
        run: pnpm --filter @tulmek/web fetch-hub-content

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet apps/web/src/content/hub/; then
            echo "changed=false" >> "$GITHUB_OUTPUT"
          else
            echo "changed=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit & push
        if: steps.changes.outputs.changed == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add apps/web/src/content/hub/
          git commit -m "chore: refresh hub content $(date -u +%Y-%m-%d)"
          git push
